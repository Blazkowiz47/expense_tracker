<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Track household spending, shared expenses, monthly plans, and recurring money.">
  <meta name="theme-color" content="#0F766E">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Expense Tracker">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Expense Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --app-accent: #1f9d78;
      --app-accent-soft: #dff2eb;
      --app-bg: #f7faf8;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--app-bg);
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--app-bg);
      z-index: 9999;
    }

    .app-loader-spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--app-accent-soft);
      border-top-color: var(--app-accent);
      border-radius: 50%;
      animation: app-loader-spin 0.8s linear infinite;
    }

    @keyframes app-loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Loading">
    <div class="app-loader-spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
