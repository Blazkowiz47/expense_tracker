<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Expense Tracker — Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 40px 20px; background: #ECEEF1;
         font-family: var(--font-sans); min-height: 100vh;
         display: flex; flex-direction: column; align-items: center; gap: 32px; }
  h1 { font-size: 14px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em;
       text-transform: uppercase; margin: 0; }
  .row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .switcher { display: flex; gap: 6px; background: #fff; padding: 4px; border-radius: 999px;
              border: 1px solid var(--border-light); }
  .switcher button { background: none; border: none; padding: 6px 14px; font-size: 12px;
                     font-weight: 500; border-radius: 999px; cursor: pointer;
                     color: var(--fg2); font-family: inherit; }
  .switcher button.sel { background: var(--accent); color: #fff; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function Root() {
      return (
        <>
          <h1>Expense Tracker · Mobile UI Kit</h1>
          <div className="row">
            <div className="stage">
              <MobileApp platform="android" />
              <div className="label">Android · Material 3</div>
            </div>
            <div className="stage">
              <MobileApp platform="ios" />
              <div className="label">iOS · Cupertino</div>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
