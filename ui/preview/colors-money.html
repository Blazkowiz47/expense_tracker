<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Money Semantics</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; margin: 0; }
  .row { display: flex; gap: 12px; }
  .card { flex: 1; background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px; }
  .label { font-size: 12px; color: var(--fg3); margin-bottom: 6px; letter-spacing: 0.02em; }
  .amt { font-size: 28px; font-weight: 700; font-feature-settings: "tnum" 1; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); margin-top: 8px; }
  .pos { color: var(--positive); }
  .neg { color: var(--negative); }
  .neu { color: var(--neutral); }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="label">Positive — you are owed</div>
    <div class="amt pos">₹1,250.00</div>
    <div class="hex">#1B8C67</div>
  </div>
  <div class="card">
    <div class="label">Negative — you owe</div>
    <div class="amt neg">₹340.00</div>
    <div class="hex">#BA1A1A · colorScheme.error</div>
  </div>
  <div class="card">
    <div class="label">Neutral — settled</div>
    <div class="amt neu">₹0.00</div>
    <div class="hex">#58646F</div>
  </div>
</div>
</body>
</html>
