<!DOCTYPE html>
<html lang="en">
<head>

<title>Components — Settings Row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; margin: 0; background: var(--bg-light); font-family: var(--font-sans); }

  <div class="card"><span class="t">Security</span><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
  <div class="card"><span class="t">Theme</span><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
  <div class="card"><span class="t">Help and feedback</span><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>

</html>
