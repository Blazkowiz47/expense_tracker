<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components — Summary Card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; margin: 0; background: var(--bg-light); font-family: var(--font-sans); }
  .card { background: #fff; border-radius: var(--radius-md); padding: 16px; }
  .label { font-size: 16px; font-weight: 500; color: var(--fg1); }
  .amt { font-size: 24px; font-weight: 700; margin-top: 6px; font-feature-settings: "tnum" 1; }
  .pos { color: var(--positive); }
</style>
</head>
<body>
  <div class="card">
    <div class="label">Overall, you are owed</div>
    <div class="amt pos">₹1,250.00</div>
  </div>
</body>
</html>
