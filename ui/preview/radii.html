<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; margin: 0; background: var(--bg-light); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 80px; height: 80px; background: #fff; border: 1px solid var(--border-light); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .pill { width: 110px; height: 36px; background: #fff; border: 1px solid var(--border-light); border-radius: 16px; }
  .circle { width: 48px; height: 48px; background: var(--accent); border-radius: 999px; margin-top: 16px; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:8px"></div><span class="tok">sm</span><span class="val">8px</span></div>
  <div class="cell"><div class="box" style="border-radius:14px"></div><span class="tok">md (card)</span><span class="val">14px</span></div>
  <div class="cell"><div class="pill"></div><span class="tok">pill</span><span class="val">16px</span></div>
  <div class="cell"><div class="circle"></div><span class="tok">full</span><span class="val">999px</span></div>
</div>
</body>
</html>
