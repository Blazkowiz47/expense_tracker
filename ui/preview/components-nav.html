<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components — Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 0; margin: 0; background: var(--bg-light); font-family: var(--font-sans); }
  .wrap { padding: 20px; }
  .nav { background: #fff; padding: 10px 8px 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; border-radius: 14px; box-shadow: 0 2px 0 rgba(0,0,0,0.85); }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; position: relative; color: var(--fg3); font-size: 11px; font-weight: 500; }
  .item.active { color: var(--fg1); }
  .pill { width: 56px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .item.active::after { content: ""; position: absolute; left: 50%; bottom: -6px; transform: translateX(-50%); width: 44px; height: 3px; border-radius: 2px; background: #1A1C1E; }
  svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .item.active svg { stroke-width: 0; fill: currentColor; }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="item active">
      <div class="pill"><svg viewBox="0 0 24 24" fill="#1A1C1E" stroke="none"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>
      Friends
    </div>
    <div class="item">
      <div class="pill"><svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v11h-6v-6H9v6H3z"/><path d="M12 13.2l-.9-.85C10.1 11.4 9.2 10.55 9.2 9.5c0-.85.65-1.5 1.5-1.5.48 0 .94.22 1.3.58.36-.36.82-.58 1.3-.58.85 0 1.5.65 1.5 1.5 0 1.05-.9 1.9-1.9 2.85z"/></svg></div>
      Family
    </div>
    <div class="item">
      <div class="pill"><svg viewBox="0 0 24 24"><path d="M17 20v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="8" r="3"/><path d="M21 20v-2a4 4 0 0 0-3-3.87"/></svg></div>
      Groups
    </div>
    <div class="item">
      <div class="pill"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 10h8M8 14h8M8 18h5"/></svg></div>
      Activity
    </div>
    <div class="item">
      <div class="pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="10" r="3"/><path d="M6.5 19c1.5-3 4-4 5.5-4s4 1 5.5 4"/></svg></div>
      Account
    </div>
  </div>
</div>
</body>
</html>
